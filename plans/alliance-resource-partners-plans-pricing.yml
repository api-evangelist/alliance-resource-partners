provider: Alliance Resource Partners
providerId: alliance-resource-partners
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Coal
  - Mining
  - Energy
description: Alliance Resource Partners (ARLP) is a coal-production and energy-royalty operator with no
  public developer portal or API pricing. Any data integrations are bilateral commercial agreements (customer
  EDI, mine telemetry, rail/barge logistics, royalty reporting) negotiated directly with ARLP partners.
sources:
  - https://www.arlp.com
notes: No public API pricing surface. Plans below are placeholder partner-agreement shells; ARLP does
  not publish a developer commercial offering.
plans:
  - id: alliance-resource-partners-partner
    name: Customer / Partner Agreement
    type: enterprise
    description: Bilateral data-integration agreement covering customer EDI, mine telemetry, logistics,
      or royalty-reporting feeds. Pricing is bespoke and negotiated.
    entries:
      - label: Integration Agreement
        description: Negotiated data-integration agreement
        name: integration_agreement
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact provider
        userMultiplied: false
    elements:
      - name: Customer EDI Feed
      - name: Mine Telemetry Data Feed
      - name: Logistics / Rail / Barge Reporting
      - name: Royalty Reporting
